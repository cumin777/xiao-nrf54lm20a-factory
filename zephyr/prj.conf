# UART
CONFIG_SERIAL=y

# GPIO
CONFIG_GPIO=y

# PWM (buzzer on D0 via PWM21)
CONFIG_PWM=y

# ADC
CONFIG_ADC=y

# SPI / external flash for deep sleep
CONFIG_SPI=y
CONFIG_SPI_NOR=y

# Sensor/IMU
CONFIG_SENSOR=y
CONFIG_LSM6DSL=y
CONFIG_LSM6DSL_TRIGGER_GLOBAL_THREAD=y

# Audio/DMIC
CONFIG_AUDIO=y
CONFIG_AUDIO_DMIC=y

# BLE scan (State3)
CONFIG_BT=y
CONFIG_BT_CENTRAL=y
CONFIG_BT_GATT_CLIENT=y
CONFIG_BT_OBSERVER=y
CONFIG_BT_RX_STACK_SIZE=8192
CONFIG_BT_HCI_TX_STACK_SIZE_WITH_PROMPT=y
CONFIG_BT_HCI_TX_STACK_SIZE=4096
# GCC 8.2 used by this PlatformIO package does not accept Zephyr 4.4's
# controller size-optimized "asm inline" assertion path.
CONFIG_BT_CTLR_ASSERT_OPTIMIZE_FOR_SIZE=n
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_MAIN_STACK_SIZE=8192

# Ship mode support
CONFIG_I2C=y
CONFIG_REGULATOR=y
CONFIG_PM_DEVICE=y
CONFIG_POWEROFF=y
CONFIG_HWINFO=y

# Flash for persistent storage
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y

# Keep console/printk enabled for Zephyr 4.4 board defaults, but keep logs/shell off.
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_LOG=n
CONFIG_SHELL=n
CONFIG_STDOUT_CONSOLE=n
CONFIG_BOOT_BANNER=n
