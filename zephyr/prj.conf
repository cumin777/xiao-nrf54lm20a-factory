# UART
CONFIG_SERIAL=y

# GPIO
CONFIG_GPIO=y

# ADC
CONFIG_ADC=y

# SPI / external flash for deep sleep
CONFIG_SPI=y
CONFIG_SPI_NOR=y

# Sensor/IMU
CONFIG_SENSOR=y
CONFIG_LSM6DSL=y
CONFIG_LSM6DSL_TRIGGER_GLOBAL_THREAD=y

# Audio/DMIC
CONFIG_AUDIO=y
CONFIG_AUDIO_DMIC=y

# BLE scan (State3)
CONFIG_BT=y
CONFIG_BT_CENTRAL=y
CONFIG_BT_GATT_CLIENT=y
CONFIG_BT_OBSERVER=y
CONFIG_BT_CTLR=y
CONFIG_BT_LOG_LEVEL_OFF=y
CONFIG_BT_RX_STACK_SIZE=8192
CONFIG_BT_HCI_TX_STACK_SIZE_WITH_PROMPT=y
CONFIG_BT_HCI_TX_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_MAIN_STACK_SIZE=8192

# Ship mode support
CONFIG_I2C=y
CONFIG_REGULATOR=y
CONFIG_PM_DEVICE=y
CONFIG_POWEROFF=y
CONFIG_HWINFO=y

# Flash for persistent storage
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y

# Disable console/shell/log - we use raw UART
CONFIG_CONSOLE=n
CONFIG_PRINTK=n
CONFIG_LOG=n
CONFIG_SHELL=n
CONFIG_STDOUT_CONSOLE=n
