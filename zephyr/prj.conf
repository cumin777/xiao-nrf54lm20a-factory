# UART
CONFIG_SERIAL=y

# GPIO
CONFIG_GPIO=y

# ADC
CONFIG_ADC=y

# Sensor/IMU
CONFIG_SENSOR=y
CONFIG_LSM6DSL=y

# Audio/DMIC
CONFIG_AUDIO=y
CONFIG_AUDIO_DMIC=y

# BLE scan (State3)
CONFIG_BT=y
CONFIG_BT_OBSERVER=y
CONFIG_BT_CTLR=y

# Ship mode support
CONFIG_I2C=y
CONFIG_REGULATOR=y

# Flash for persistent storage
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y

# Disable console/shell/log - we use raw UART
CONFIG_CONSOLE=n
CONFIG_PRINTK=n
CONFIG_LOG=n
CONFIG_SHELL=n
CONFIG_STDOUT_CONSOLE=n
